<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitrogênio Protocolo | DAO</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.12.1/dist/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <header>
        <div class="logo-area">
            <h1>NITROGÊNIO <span>N</span></h1>
            <p class="network-label">BSC MAINNET</p>
        </div>
        <button id="btn-conectar" class="btn-wallet">CONECTAR CARTEIRA</button>
    </header>

    <main>
        <section class="card-master">
            <div class="balance-info">
                <p class="label">SALDO EM CARTEIRA</p>
                <h2 id="display-bnb">0.0000 <span>BNB</span></h2>
                <h3 id="display-n">0.00 N</h3>
            </div>
            <div class="nft-badge">
                <img src="https://img.icons8.com/ios-filled/50/007BFF/identity-theft.png" alt="NFT Alpha">
                <span>SEM ACESSO ALPHA</span>
            </div>
        </section>

        <nav class="nav-actions">
            <button class="btn-act" id="btn-pagar">↑ PAGAR</button>
            <button class="btn-act" id="btn-receber">↓ RECEBER</button>
            <button class="btn-act">N COLETAR</button>
            <button class="btn-act">⇄ TROCAR</button>
        </nav>

        <section class="grid-dao">
            <div class="sala">GOVERNO</div>
            <div class="sala">MURAL</div>
            <div class="sala">COMUNIDADE</div>
            <div class="sala">TESOURARIA</div>
        </section>

        <section class="mint-area">
            <h3>MINT NFT ALPHA</h3>
            <p class="sub-text">Acesso exclusivo aos 21 Guardiões e Membros.</p>
            <input type="text" id="padrinho" placeholder="Endereço do Padrinho (Opcional)">
            <button class="btn-mint">MINTAR AGORA (0.1 BNB)</button>
        </section>
    </main>

    <div id="cam-overlay" class="overlay">
        <div id="reader"></div>
        <button id="fechar-cam" class="btn-close">✕ CANCELAR</button>
    </div>

    <div id="modal-confirm" class="modal-bottom">
        <h3>CONFIRMAR PAGAMENTO</h3>
        <p id="info-destino"></p>
        <input type="number" id="valor-input" placeholder="0.00" step="0.001" inputmode="decimal">
        <button id="confirmar-pagamento" class="btn-confirm">CONFIRMAR E ASSINAR</button>
        <button id="cancelar-pagamento" class="btn-cancel">CANCELAR</button>
    </div>

    <script>
        window.onload = () => {
            console.log("Sistema pronto. Carregando motor Nitrogen...");
            const script = document.createElement('script');
            // O código abaixo evita que o celular use o arquivo "velho" do cache
            script.src = 'script.js?v=' + Date.now(); 
            document.body.appendChild(script);
        };
    </script>
</body>
</html>
