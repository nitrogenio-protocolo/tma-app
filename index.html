<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitrogênio Protocolo</title>
    <style>
        /* RESET BÁSICO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            overflow: hidden; /* Evita barras de rolagem durante a splash */
        }

        /* CONTAINER DA SPLASH */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #007AFF; /* Azul Nitrogênio */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease-out;
        }

        .splash-content {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .splash-text {
            position: absolute;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bold;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0;
        }

        /* 1º PASSO: DAO (PULSO) */
        #text-dao {
            animation: fadeInOutPulse 2s forwards ease-in-out;
            animation-delay: 0.5s;
        }

        /* 2º PASSO: NITROGÊNIO (APARECE E SOME) */
        #text-nitrogenio {
            animation: fadeInOut 2s forwards ease-in-out;
            animation-delay: 2.5s;
        }

        /* 3º PASSO: A RAPOSA (MATERIALIZAÇÃO FINAL) */
        #splash-logo {
            position: absolute;
            width: 160px;
            opacity: 0;
            filter: blur(15px) brightness(2);
            transform: scale(0.8);
            animation: materializeRa 2.5s forwards ease-in-out;
            animation-delay: 4.5s;
        }

        /* --- ANIMAÇÕES --- */

        @keyframes fadeInOutPulse {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(1); }
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            50% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        @keyframes materializeRa {
            0% { opacity: 0; filter: blur(20px) brightness(5); transform: scale(0.7); }
            100% { opacity: 1; filter: blur(0) brightness(1); transform: scale(1); }
        }

        .fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div id="text-dao" class="splash-text">DAO</div>
            <div id="text-nitrogenio" class="splash-text">Nitrogênio</div>
            <img src="raposa.png" alt="Raposa" id="splash-logo">
        </div>
    </div>

    <div style="padding: 40px; text-align: center; font-family: sans-serif;">
        <h1 style="color: #007AFF;">Protocolo Ativo</h1>
        <p>Bem-vindo ao ecossistema.</p>
    </div>

    <script>
        window.addEventListener('load', () => {
            // Tempo total: 0.5s (espera) + 2s (DAO) + 2s (Nitrogênio) + 2.5s (Raposa) = ~7-8 segundos
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.classList.add('fade-out');
                    setTimeout(() => splash.remove(), 1000);
                }
            }, 8500); 
        });
    </script>
</body>
</html>
