<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitrogênio Protocolo v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div id="text-dao" class="splash-text">DAO</div>
            <div id="text-nitrogenio" class="splash-text">Nitrogênio</div>
            <img src="raposa.png" alt="Logo" id="splash-logo">
        </div>
    </div>

    <div id="home-app">
        <header class="header-app">
            <div class="logo-text">Nitrogênio</div>
            <button id="connect-trigger" class="btn-connect">CONECTAR</button>
        </header>

        <div class="balance-section">
            <div class="balance-label">Saldo em Conta</div>
            <div class="balance-main">
                <span class="balance-amount">0.00 BNB</span>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-item" onclick="abrirPagar()">
                <i class="fa-solid fa-arrow-up"></i>
                <span>pagar</span>
            </div>
            <div class="action-item" onclick="abrirReceber()">
                <i class="fa-solid fa-arrow-down"></i>
                <span>receber</span>
            </div>
            <div class="action-item">
                <i class="fa-solid fa-right-left"></i>
                <span>trocar</span>
            </div>
        </div>

        <div class="banner-nft">
            <div class="nft-info">
                <strong>NFT ALPHA</strong>
                <span id="nft-balance">Credencial Alpha</span> 
            </div>
            <img src="raposa.png" class="raposa-no-card" alt="Raposa Nitrogen">
        </div>

        <div class="rooms-grid">
            <div class="room-icon"><i class="fa-solid fa-vault"></i></div>
            <div class="room-icon"><i class="fa-solid fa-leaf"></i></div>
            <div class="room-icon"><i class="fa-solid fa-landmark"></i></div>
            <div class="room-icon"><i class="fa-solid fa-users"></i></div>
            <div class="room-icon"><i class="fa-solid fa-chalkboard"></i></div>
            <div class="room-icon"><i class="fa-solid fa-microchip"></i></div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item"><i class="fa-brands fa-telegram"></i></div>
            <div class="nav-item"><i class="fa-solid fa-circle-question"></i></div>
        </nav>
    </div>

    <div id="area-receber" class="area-interna" style="display: none;">
        <header class="area-header">
            <i class="fa-solid fa-angle-left" onclick="fecharReceber()"></i>
            <h2>RECEBER</h2>
        </header>
        <div class="conversion-card">
            <div class="balance-label">Valor a receber (BNB)</div>
            <div class="input-group">
                <input type="number" id="bnb-receber" placeholder="0.00" step="0.0001">
            </div>
        </div>
        <div class="grupo-botoes">
            <button class="btn-pilula btn-cancelar" onclick="fecharReceber()">CANCELAR</button>
            <button id="btn-gerar-qr" class="btn-pilula btn-acao" onclick="gerarCobranca()" disabled>GERAR QR</button>
        </div>
        <div id="qrcode-container" style="display: flex; justify-content: center; margin-top: 20px;"></div>
    </div>

    <div id="area-pagar" class="area-interna" style="display: none;">
        <header class="area-header">
            <i class="fa-solid fa-angle-left" onclick="fecharPagar()"></i>
            <h2>PAGAR</h2>
        </header>
        <div class="conversion-card">
            <div class="balance-label">VALOR EM BNB</div>
            <div class="input-group">
                <input type="number" id="valor-pagar" placeholder="0.0000" step="0.0001">
            </div>
            <div class="balance-label">DESTINO (CARTEIRA)</div>
            <div class="address-container">
                <input type="text" id="wallet-address" placeholder="0x...">
                <i class="fas fa-qrcode" onclick="toggleScanner()"></i>
            </div>
            <div id="reader" style="width: 100%; display:none; margin-top:15px; border-radius:15px; overflow:hidden; border: 2px solid #007bff;"></div>
        </div>
        <div class="grupo-botoes">
            <button class="btn-pilula btn-cancelar" onclick="fecharPagar()">CANCELAR</button>
            <button id="btn-confirmar-pagar" class="btn-pilula btn-acao" disabled>CONFIRMAR PAGAMENTO</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
