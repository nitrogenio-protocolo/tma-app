<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitrogênio | Motor BNB</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/index.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <header>
        <h1>NITROGÊNIO <span>N</span></h1>
        <button id="btn-conectar" class="btn-wallet">CONECTAR</button>
    </header>

    <main>
        <section class="card-master">
            <p class="label">SALDO BNB (TESTE)</p>
            <div class="balance" id="display-bnb">0.0000 <span>BNB</span></div>
            <p id="display-n" class="token-n">0.00 N</p>
        </section>

        <nav class="nav-actions">
            <button class="btn-act" id="btn-pagar">
                <div class="icon">↑</div>
                <span>PAGAR</span>
            </button>
            <button class="btn-act">
                <div class="icon">↓</div>
                <span>RECEBER</span>
            </button>
            <button class="btn-act">
                <div class="icon">N</div>
                <span>COLETAR</span>
            </button>
            <button class="btn-act">
                <div class="icon">⇄</div>
                <span>TROCAR</span>
            </button>
        </nav>
    </main>

    <div id="cam-overlay" class="overlay">
        <div class="scanner-container">
            <div id="reader"></div>
            <button class="btn-close-cam">✕</button>
        </div>
    </div>

    <div id="modal-confirm" class="modal-bottom">
        <h3>CONFIRMAR PAGAMENTO</h3>
        <p id="info-destino" class="dest-text"></p>
        <input type="number" id="valor-input" placeholder="0.00" step="0.001" inputmode="decimal">
        <button id="btn-executar" class="btn-confirm">CONFIRMAR E ASSINAR</button>
        <button id="btn-cancelar" class="btn-cancel">CANCELAR</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
