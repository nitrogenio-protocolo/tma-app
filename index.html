<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitrogênio Protocolo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div id="text-dao" class="splash-text">DAO</div>
            <div id="text-nitrogenio" class="splash-text">Nitrogênio</div>
            <img src="raposa.png" alt="Raposa" id="splash-logo">
        </div>
    </div>

    <div id="home-app">
        <header class="header-app">
            <div class="logo-text">Nitrogênio</div>
            <button class="btn-connect">CONECTAR</button>
        </header>

        <div class="balance-section">
    <div class="balance-label">Saldo em Conta</div>
    <div class="balance-main">
        <span class="balance-amount">0.00 N</span>


        <div class="action-bar">
            <div class="action-item"><i class="fa-solid fa-arrow-up"></i>pagar</div>
            <div class="action-item"><i class="fa-solid fa-arrow-down"></i>receber</div>
            <div class="action-item"><i class="fa-solid fa-right-left"></i>trocar</div>
        </div>

        <div class="banner-nft">
    <strong>NFT ALPHA</strong>
    <img src="raposa.png" class="raposa-no-card" alt="Raposa Nitrogen">
</div>
       <div id="area-receber" style="display: none; padding: 20px;">
    <div class="conversion-card">
        <div class="balance-label">Valor a Receber (R$)</div>
        <div class="input-group">
            <span>R$</span>
            <input type="number" id="brl-input" placeholder="0,00" step="0.01">
        </div>
        <div class="bnb-estimate">
            Você receberá: <span id="bnb-display">0.000000</span> BNB
        </div>
    </div>
    
    <div id="qrcode-container" style="text-align: center; margin-top: 20px;"></div>
    
    <button onclick="fecharReceber()" style="width: 100%; margin-top: 20px; background: #eee; border: none; padding: 10px; border-radius: 10px;">
        Cancelar
    </button>
</div>

 <div class="rooms-grid">
            <div class="room-icon"><i class="fa-solid fa-vault"></i></div>
            <div class="room-icon"><i class="fa-solid fa-cart-shopping"></i></div>
            <div class="room-icon"><i class="fa-solid fa-leaf"></i></div>
            <div class="room-icon"><i class="fa-solid fa-headset"></i></div>
            <div class="room-icon"><i class="fa-solid fa-landmark"></i></div>
            <div class="room-icon"><i class="fa-solid fa-users"></i></div>
            <div class="room-icon"><i class="fa-solid fa-chalkboard"></i></div>
            <div class="room-icon"><i class="fa-solid fa-microchip"></i></div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item" style="color: #007AFF;"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item"><i class="fa-brands fa-telegram"></i></div>
            <div class="nav-item"><i class="fa-solid fa-circle-question"></i></div>
        </nav>
    </div>
                   </nav>
    </div> <div id="tela-sucesso">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <div class="success-text">
            <h2>Pagamento Recebido!</h2>
            <p id="valor-confirmado">0.00 BNB</p>
            <p style="font-size: 12px; margin-top: 10px;">Transação confirmada na BNB Chain</p>
        </div>
        <button onclick="location.reload()" style="margin-top: 30px; padding: 10px 20px; border-radius: 8px; border: none; background: #007BFF; color: white; cursor: pointer;">
            Nova Cobrança
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
