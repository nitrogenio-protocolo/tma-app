<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitrogênio Protocolo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="splash-screen" class="splash">
        <div class="splash-content">
            <h1 class="fade-in">NITROGÊNIO</h1>
            <p class="fade-in-delay">DAO</p>
        </div>
    </div>

    <div id="home-screen" class="container" style="display: none;">
        <header>
            <div class="logo-area">
                <span class="brand-name">NITROGÊNIO</span>
            </div>
            <div class="header-actions">
                <i id="toggle-visibility" class="fas fa-eye eye-btn"></i>
                <button class="btn-conectar">CONECTAR</button>
            </div>
        </header>

        <main>
            <section class="balance-section">
                <p>SALDO EM CONTA <i class="fas fa-sync-alt refresh-icon"></i></p>
                <h2 id="saldo-valor">0.00 N</h2>
            </section>

            <nav class="quick-actions">
                <div class="action-item"><i class="fas fa-arrow-up"></i><span>PAGAR</span></div>
                <div class="action-item"><i class="fas fa-arrow-down"></i><span>RECEBER</span></div>
                <div class="action-item"><i class="fas fa-th-large"></i><span>SCAN</span></div>
                <div class="action-item"><i class="fas fa-exchange-alt"></i><span>TROCAR</span></div>
            </nav>

            <div class="nft-alpha-card">
                <div class="nft-info">
                    <h3>NFT ALPHA</h3>
                </div>
                <div class="nft-visual">
                    <i class="fas fa-fox raposa-logo"></i> 
                    </div>
            </div>

            <div class="function-grid">
                <div class="grid-item"><i class="fas fa-wallet"></i></div>
                <div class="grid-item"><i class="fas fa-shopping-cart"></i></div>
                <div class="grid-item"><i class="fas fa-leaf"></i></div>
                <div class="grid-item"><i class="fas fa-headset"></i></div>
                <div class="grid-item"><i class="fas fa-university"></i></div>
                <div class="grid-item"><i class="fas fa-users"></i></div>
                <div class="grid-item"><i class="fas fa-laptop"></i></div>
                <div class="grid-item"><i class="fas fa-microchip"></i></div>
            </div>
        </main>

        <footer class="bottom-nav">
            <i class="fas fa-home active"></i>
            <i class="fas fa-paper-plane"></i>
            <i class="fas fa-question-circle"></i>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
