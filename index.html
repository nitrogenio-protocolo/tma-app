<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitrogênio Protocolo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div id="text-dao" class="splash-text">DAO</div>
            <div id="text-nitrogenio" class="splash-text">Nitrogênio</div>
            <img src="raposa.png" alt="Raposa" id="splash-logo">
        </div>
    </div>

    <div id="home-app" style="opacity: 0; display: none;">
        
        <header class="header-app">
            <div class="logo-text">Nitrogênio</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <button id="toggle-visibility" style="background: none; border: none; color: #86868b; font-size: 18px; cursor: pointer;">
                    <i class="fa-solid fa-eye"></i>
                </button>
                <button class="btn-connect" id="connect-trigger">CONECTAR</button>
            </div>
        </header>

        <div class="balance-section">
            <div class="balance-label">Saldo em Conta</div>
            <div class="balance-amount" id="main-balance">0.00 N</div>
        </div>

        <div class="action-bar">
            <div class="action-item" id="btn-pagar"><i class="fa-solid fa-arrow-up"></i>PAGAR</div>
            <div class="action-item" id="btn-receber"><i class="fa-solid fa-arrow-down"></i>RECEBER</div>
            <div class="action-item" id="btn-scan"><i class="fa-solid fa-qrcode"></i>SCAN</div>
            <div class="action-item"><i class="fa-solid fa-right-left"></i>TROCAR</div>
        </div>

        <div class="banner-nft">
            <strong>NFT ALPHA</strong>
            <i class="fa-solid fa-id-badge" style="position: absolute; right: 20px; font-size: 80px; opacity: 0.15;"></i>
        </div>

        <div class="rooms-grid">
            <div class="room-icon"><i class="fa-solid fa-vault"></i></div>
            <div class="room-icon"><i class="fa-solid fa-cart-shopping"></i></div>
            <div class="room-icon"><i class="fa-solid fa-leaf"></i></div>
            <div class="room-icon"><i class="fa-solid fa-headset"></i></div>
            <div class="room-icon"><i class="fa-solid fa-landmark"></i></div>
            <div class="room-icon"><i class="fa-solid fa-users"></i></div>
            <div class="room-icon"><i class="fa-solid fa-chalkboard"></i></div>
            <div class="room-icon"><i class="fa-solid fa-microchip"></i></div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item" style="color: #007AFF;"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" style="color: #ccc;"><i class="fa-brands fa-telegram"></i></div>
            <div class="nav-item" style="color: #ccc;"><i class="fa-solid fa-circle-question"></i></div>
        </nav>
    </div>

    <div id="modal-operacao" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto;">
        
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="modal-titulo" style="color: #007AFF; margin: 0; font-size: 20px;">Operação</h2>
            <button id="fechar-modal" style="background: none; border: none; font-size: 28px; color: #ccc; cursor: pointer;">&times;</button>
        </header>

        <div id="destino-info" style="font-size: 13px; color: #86868b; background: #f5f5f7; padding: 10px; border-radius: 8px; word-break: break-all; margin-bottom: 30px;">
            Aguardando dados...
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <div style="margin-bottom: 5px; color: #86868b; font-size: 14px;">Valor em BRL</div>
            <div style="display: flex; justify-content: center; align-items: baseline;">
                <span style="font-size: 24px; font-weight: bold; margin-right: 8px;">R$</span>
                <input type="number" id="input-valor-brl" placeholder="0.00" step="0.01" style="font-size: 48px; border: none; outline: none; width: 180px; text-align: left; font-family: inherit; font-weight: bold;">
            </div>
            <div id="conversao-token" style="color: #007AFF; font-size: 18px; margin-top: 10px; font-weight: 500;">
                ≈ 0.00 Token N
            </div>
        </div>

        <div id="area-qr" style="display: none; text-align: center; margin-top: 30px;">
            <div id="qrcode-container" style="display: inline-block; padding: 15px; background: white; border: 2px solid #007AFF; border-radius: 12px;"></div>
            <div style="margin-top: 10px; font-size: 12px; color: #86868b;">Mostre este código para receber</div>
        </div>

        <div id="taxa-dao-aviso" style="text-align: center; font-size: 12px; color: #86868b; margin-top: 40px;">
            <i class="fa-solid fa-shield-halved"></i> + 1% taxa DAO destinada ao cofre
        </div>

        <button id="btn-acao-principal" class="btn-connect" style="width: calc(100% - 40px); position: fixed; bottom: 30px; left: 20px; height: 60px; font-size: 18px; letter-spacing: 1px;">
            CONFIRMAR
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
