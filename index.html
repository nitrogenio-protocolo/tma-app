<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitrogênio Protocolo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header id="header-app">
    <div class="header-content">
        <span class="brand-name">NITROGÊNIO</span>
        <div class="header-actions">
            <button class="btn-eye-black"><i class="fa-solid fa-eye"></i></button>
            <button class="btn-wallet">CONECTAR</button>
        </div>
    </div>
</header>

<main class="main-content">

    <section class="balance-container">
        <div class="balance-display">
            <span class="label">SALDO EM CARTEIRA</span>
            <div class="main-amount">
                <span class="currency">0.0000</span>
                <span class="symbol">BNB</span>
            </div>
            <div class="conversion">
                <p id="balance-brl">Aguardando conexão...</p>
            </div>
        </div>
    </section>
    
    <section class="hub-carousel">
        <div class="carousel-track">
            <div class="item-wrapper" onclick="abrirSala('sala-pagar')">
                <div class="item-round"><i class="fa-solid fa-arrow-up"></i></div>
                <span>PAGAR</span>
            </div>
            <div class="item-wrapper" onclick="abrirSala('sala-receber')">
                <div class="item-round"><i class="fa-solid fa-arrow-down"></i></div>
                <span>RECEBER</span>
            </div>
            <div class="item-wrapper" onclick="abrirSala('sala-coletar')">
                <div class="item-round"><div class="n-simbolo">N</div></div>
                <span>COLETAR</span>
            </div>
            <div class="item-wrapper" onclick="abrirSala('sala-trocar')">
                <div class="item-round"><i class="fa-solid fa-repeat"></i></div>
                <span>TROCAR</span>
            </div>
        </div>
    </section>

    </main>

<div id="container-salas">
    <div id="sala-pagar" class="sala-card">
        <div class="sala-handle"></div>
        <div class="sala-header">
            <button class="btn-fechar" onclick="fecharSala('sala-pagar')"><i class="fa-solid fa-xmark"></i></button>
            <h2>PAGAR</h2>
        </div>
        <div class="sala-body" style="text-align: center; padding: 15px 25px;">
            <div style="margin-bottom: 20px;">
                <button class="btn-camera" onclick="iniciarScanner()" style="width: 100%; padding: 30px 20px; border-radius: 24px; border: 3px dashed var(--azul-blueberry); background: var(--cor-fundo-camuflagem); color: var(--azul-blueberry); font-weight: 800;">
                    <i class="fa-solid fa-qrcode fa-3x" style="display: block; margin-bottom: 10px;"></i>
                    ESCANEAR QR CODE
                </button>
                <div id="reader" style="width: 100%; border-radius: 20px; overflow: hidden; display: none; margin-top: 10px;"></div>
            </div>

            <div style="margin-bottom: 15px; background: var(--cor-fundo-camuflagem); padding: 12px; border-radius: 18px;">
                <label style="font-size: 10px; font-weight: 800; color: var(--cinza-suave); display: block; margin-bottom: 5px;">CARTEIRA DESTINO</label>
                <input type="text" id="chave-pagamento" placeholder="0x..." 
                    style="background: none; border: none; font-size: 14px; font-weight: 600; width: 100%; outline: none; color: var(--texto-escuro); text-align: center;">
            </div>

            <div style="margin-bottom: 20px; background: var(--cor-fundo-camuflagem); padding: 12px; border-radius: 18px;">
                <label style="font-size: 10px; font-weight: 800; color: var(--cinza-suave); display: block; margin-bottom: 5px;">VALOR EM R$</label>
                <input type="number" id="valor-pagar-brl" placeholder="0,00" step="0.01" inputmode="decimal"
                    style="background: none; border: none; font-size: 20px; font-weight: 800; width: 100%; outline: none; color: var(--texto-escuro); text-align: center;">
            </div>

            <div style="display: flex; gap: 15px;">
                <button onclick="fecharSala('sala-pagar')" class="btn-cancelar">CANCELAR</button>
                <button id="btn-confirmar-pagar" class="btn-confirmar">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <div id="sala-receber" class="sala-card">
        <div class="sala-handle"></div>
        <div class="sala-header">
            <button class="btn-fechar" onclick="fecharSala('sala-receber')"><i class="fa-solid fa-xmark"></i></button>
            <h2>RECEBER</h2>
        </div>
        <div class="sala-body" style="text-align: center; padding: 15px 25px;">
            <div style="margin-bottom: 20px;">
                <label style="font-size: 12px; font-weight: 800; color: var(--cinza-suave); display: block; margin-bottom: 8px;">VALOR DA COBRANÇA (R$)</label>
                <div style="display: flex; align-items: center; justify-content: center; background: var(--cor-fundo-camuflagem); padding: 15px; border-radius: 18px;">
                    <span style="font-size: 24px; font-weight: 900; color: var(--texto-escuro); margin-right: 5px;">R$</span>
                    <input type="number" id="valor-brl" placeholder="0,00" step="0.01" inputmode="decimal" 
                        style="background: none; border: none; font-size: 32px; font-weight: 900; width: 100%; outline: none; color: var(--texto-escuro);">
                </div>
                <p id="conversao-preview" style="font-size: 12px; color: var(--azul-blueberry); font-weight: 700; margin-top: 8px;">≈ 0.0000 BNB</p>
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 25px;">
                <button onclick="fecharSala('sala-receber')" class="btn-cancelar">CANCELAR</button>
                <button id="btn-confirmar-receber" disabled class="btn-confirmar">GERAR QR</button>
            </div>

            <div id="qrcode-area" class="qr-container">
                <img id="img-qrcode" src="" alt="QR Code" style="width: 180px; height: 180px; display: none;">
                <div id="placeholder-qr" style="width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; color: #ddd;">
                    <i class="fa-solid fa-qrcode fa-4x"></i>
                </div>
            </div>
        </div>
    </div>
    
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="script.js"></script>
</body>
</html>
