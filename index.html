<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitrogênio Protocolo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIÁVEIS E RESET --- */
        :root {
            --azul-nitro: #007AFF;
            --branco-puro: #ffffff;
            --cinza-suave: #f8f8f8;
            --cinza-texto: #9e9e9e;
            --preto-suave: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--branco-puro);
            color: var(--preto-suave);
            overflow-x: hidden;
        }

        /* --- TELA DE SPLASH (Abertura) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--branco-puro);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1s ease-out;
        }

        .logo-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #splash-logo {
            width: 150px;
            z-index: 2;
            opacity: 0;
            filter: blur(10px) brightness(2);
            transform: scale(0.8);
            animation: materialize 2.5s forwards ease-in-out;
        }

        /* O brilho azul etéreo sincronizado */
        .materialize-glow {
            position: absolute;
            width: 150px;
            height: 150px;
            background: var(--azul-nitro);
            filter: blur(45px);
            border-radius: 50%;
            opacity: 0;
            animation: glow-sync 2.5s forwards ease-in-out;
        }

        @keyframes materialize {
            0% { opacity: 0; filter: blur(20px) brightness(5); transform: scale(0.7); }
            50% { opacity: 0.8; filter: blur(5px) brightness(1.2); transform: scale(1.05); }
            100% { opacity: 1; filter: blur(0) brightness(1); transform: scale(1); }
        }

        @keyframes glow-sync {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.4; transform: scale(1.3); }
            100% { opacity: 0.15; transform: scale(1); }
        }

        .fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* --- CONTEÚDO PRINCIPAL (APP) --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px 20px;
        }

        .btn-conectar {
            background: #000;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-conectar:active {
            transform: scale(0.95);
        }

        .saldo-box {
            padding: 0 20px;
            margin-bottom: 40px;
        }

        .saldo-label {
            color: var(--cinza-texto);
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
        }

        .saldo-valor {
            font-size: 36px;
            font-weight: 500;
            letter-spacing: -1px;
        }

        .saldo-valor span {
            color: #d1d1d1;
            font-size: 22px;
            margin-left: 5px;
        }

        /* Grade de Salas/Cards */
        .grid-salas {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 0 20px;
        }

        .icon-card {
            background: var(--cinza-suave);
            border-radius: 24px;
            aspect-ratio: 1/1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ccc;
            font-size: 24px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .icon-card:active {
            transform: scale(0.94);
            background: #f0f0f0;
        }

        /* Navegação Inferior */
        .footer-nav {
            position: fixed;
            bottom: 0; width: 100%;
            height: 80px;
            background: var(--branco-puro);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .footer-icon {
            color: #ddd;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .footer-icon:hover {
            color: var(--azul-nitro);
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-container">
            <img src="logo-raposa-branca.png" alt="Nitrogênio" id="splash-logo">
            <div class="materialize-glow"></div>
        </div>
    </div>

    <header class="header-container">
        <div style="font-weight: 700; font-size: 18px;">N</div>
        <button class="btn-conectar">CONECTAR CARTEIRA</button>
    </header>

    <main>
        <section class="saldo-box">
            <span class="saldo-label">Saldo disponível</span>
            <h1 class="saldo-valor">0,00 <span>N</span></h1>
        </section>

        <section class="grid-salas">
            <div class="icon-card">✦</div>
            <div class="icon-card">⬢</div>
            <div class="icon-card">≋</div>
            <div class="icon-card">◈</div>
        </section>
    </main>

    <nav class="footer-nav">
        <div class="footer-icon">🏠</div>
        <div class="footer-icon">🎯</div>
        <div class="footer-icon">👥</div>
        <div class="footer-icon">⚙️</div>
    </nav>

    <script>
        // Lógica de transição da Splash para o App
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if(splash) {
                    splash.classList.add('fade-out');
                    // Remove do sistema para não consumir memória
                    setTimeout(() => splash.remove(), 1000);
                }
            }, 3000); // Fica na tela por 3 segundos
        });
    </script>

</body>
</html>
