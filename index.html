<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitrogênio - Experiência de Materialização</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Mantém a paz visual, sem barras de rolagem */
        }

        /* 💙 Fundo Blueberry da Experiência Inicial */
        .experience-container {
            background-color: #0047AB; /* Blueberry */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
            transition: transform 1.2s cubic-bezier(0.65, 0, 0.35, 1); /* Cortina suave */
        }

        /* ✨ Efeito de Materialização (Escala e Transparência) */
        .materialize {
            color: white;
            font-weight: 200;
            letter-spacing: 5px;
            font-size: 2.5rem;
            
            opacity: 0;
            transform: scale(0); /* Começa do zero absoluto */
            transition: all 1.8s ease-out; /* Materialização lenta e suave */
        }

        /* Estados de Animação */
        .materialize.visible {
            opacity: 1;
            transform: scale(1); /* Chega ao tamanho normal */
        }

        /* 🥼 Ambiente Pós-Experiência (Branco Máximo) */
        .white-realm {
            background-color: #FFFFFF;
            width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0;
            transition: opacity 1s;
        }

        .realm-visible {
            opacity: 1;
        }

    </style>
</head>
<body>

    <div id="experience" class="experience-container">
        <div id="material-text" class="materialize">DAO</div>
    </div>

    <div id="realm" class="white-realm">
        <h2 style="color: #4A4A4A; font-weight: 400; margin-bottom: 30px;">Bem-vindo</h2>
        <button style="background-color: white; color: #4A4A4A; border: 1px solid #F2F2F2; padding: 15px 30px; border-radius: 50px;">Conectar Carteira</button>
    </div>

    <script>
        const experience = document.getElementById('experience');
        const text = document.getElementById('material-text');
        const realm = document.getElementById('realm');

        window.onload = () => {
            // 1. Inicia Materialização de "DAO"
            setTimeout(() => {
                text.classList.add('visible');
            }, 500);

            // 2. DAO desaparece
            setTimeout(() => {
                text.classList.remove('visible');
            }, 3000);

            // 3. Inicia Materialização de "NITROGÊNIO"
            setTimeout(() => {
                text.innerText = "NITROGÊNIO";
                text.classList.add('visible');
            }, 4500);

            // 4. A Cortina Azul Sobe (O Teletransporte Suave)
            setTimeout(() => {
                experience.style.transform = "translateY(-100%)"; // Sobe a cortina
                realm.classList.add('realm-visible'); // Revela o branco
            }, 7500);
        };
    </script>
</body>
</html>
