<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitrogênio Protocolo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div id="splash">
        <div class="materialize-animation"></div>
    </div>

    <div class="app-container" style="padding: 20px; max-width: 500px; margin: 0 auto;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <div style="font-size: 24px; font-weight: 800;">Nitrogênio</div>
            <button class="btn-conectar">
                <i data-lucide="eye" width="18"></i>
                CONECTAR
            </button>
        </header>

        <div class="saldo-box">
            <div style="color: #9e9e9e; font-size: 13px;">Saldo Token N</div>
            <div class="saldo-valor">0.00 <span style="font-size: 20px; color: #ccc;">N</span></div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 30px 0;">
            <div class="icon-card" style="aspect-ratio: 1/1; display: flex; justify-content: center; align-items: center; color: #bbb;"><i data-lucide="arrow-up-right"></i></div>
            <div class="icon-card" style="aspect-ratio: 1/1; display: flex; justify-content: center; align-items: center; color: #bbb;"><i data-lucide="arrow-down-left"></i></div>
            <div class="icon-card" style="aspect-ratio: 1/1; display: flex; justify-content: center; align-items: center; color: #bbb;"><i data-lucide="qr-code"></i></div>
            <div class="icon-card" style="aspect-ratio: 1/1; display: flex; justify-content: center; align-items: center; color: #bbb;"><i data-lucide="refresh-cw"></i></div>
        </div>

        <div style="background: #f9f9f9; height: 160px; border-radius: 20px; display: flex; justify-content: center; align-items: center; color: #ddd; font-size: 12px; letter-spacing: 3px; margin-bottom: 20px;">
            NFT ALPHA
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="icon-card" style="height: 120px; display: flex; justify-content: center; align-items: center; color: #bbb;"><i data-lucide="shopping-cart" width="28"></i></div>
            <div class="icon-card" style="height: 120px; display: flex; justify-content: center; align-items: center; color: #bbb;"><i data-lucide="landmark" width="28"></i></div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').remove(), 600);
            }, 2500);
        });
    </script>
</body>
</html>
