<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitrogênio Protocolo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div id="text-dao" class="splash-text">DAO</div>
            <div id="text-nitrogenio" class="splash-text">Nitrogênio</div>
            <img src="raposa.png" alt="Raposa" id="splash-logo">
        </div>
    </div>

    <div id="home-app">
        <header class="header-app">
            <div class="logo-text">Nitrogênio</div>
            <button id="connect-trigger" class="btn-connect">CONECTAR</button>
        </header>

        <div class="balance-section">
            <div class="balance-label">Saldo em Conta</div>
            <div class="balance-main">
                <span class="balance-amount">0.00 N</span>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-item">
                <i class="fa-solid fa-arrow-up"></i>
                <span>pagar</span>
            </div>
            <div id="btn-receber" class="action-item" style="cursor: pointer;">
                <i class="fa-solid fa-arrow-down"></i>
                <span>receber</span>
            </div>
            <div class="action-item">
                <i class="fa-solid fa-right-left"></i>
                <span>trocar</span>
            </div>
        </div>

        <div class="banner-nft">
            <strong>NFT ALPHA</strong>
            <img src="raposa.png" class="raposa-no-card" alt="Raposa Nitrogen">
        </div>

        <div class="rooms-grid">
            <div class="room-icon"><i class="fa-solid fa-vault"></i></div>
            <div class="room-icon"><i class="fa-solid fa-cart-shopping"></i></div>
            <div class="room-icon"><i class="fa-solid fa-leaf"></i></div>
            <div class="room-icon"><i class="fa-solid fa-headset"></i></div>
            <div class="room-icon"><i class="fa-solid fa-landmark"></i></div>
            <div class="room-icon"><i class="fa-solid fa-users"></i></div>
            <div class="room-icon"><i class="fa-solid fa-chalkboard"></i></div>
            <div class="room-icon"><i class="fa-solid fa-microchip"></i></div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item" style="color: #007AFF;"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item"><i class="fa-brands fa-telegram"></i></div>
            <div class="nav-item"><i class="fa-solid fa-circle-question"></i></div>
        </nav>
    </div>

    <div id="area-receber" style="display: none; padding: 20px;">
        <div class="conversion-card">
            <div class="balance-label">Valor a Receber (R$)</div>
            <div class="input-group">
                <span>R$</span>
                <input type="number" id="brl-input" placeholder="0,00" step="0.01">
            </div>
            <div class="bnb-estimate">
                Você receberá: <span id="bnb-display">0.000000</span> BNB
            </div>
        </div>
        
        <div id="qrcode-container" style="text-align: center; margin-top: 20px;"></div>
        
        <button onclick="fecharReceber()" style="width: 100%; margin-top: 20px; background: #eee; border: none; padding: 15px; border-radius: 12px; font-weight: bold;">
            Cancelar
        </button>
    </div>

   <div id="area-pagar" style="display: none; padding: 20px;">
    <div class="conversion-card">
        <div class="balance-label">VALOR A PAGAR (N)</div>
        <div class="input-group">
            <span>N</span>
            <input type="number" id="valor-pagar" placeholder="0.00" step="0.01">
        </div>
        
        <div class="balance-label" style="margin-top: 15px;">ENDEREÇO DE DESTINO</div>
        <div class="address-container" style="position: relative; margin-top: 10px;">
            <input type="text" id="wallet-address" placeholder="0x... ou ler QR" 
                   style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #eee; background: #f9f9f9; outline: none;">
            <i class="fas fa-qrcode qr-icon-button" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #007AFF; cursor: pointer;" onclick="abrirScanner()"></i>
        </div>
        
        <div class="bnb-estimate">Taxa de rede: <span id="taxa-estimada">Calculando...</span></div>
    </div>

    <button onclick="fecharPagar()" style="width: 100%; margin-top: 20px; background: #f5f5f7; border: none; padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer;">
        Cancelar
    </button>
</div>
    
    <div id="tela-sucesso" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; flex-direction: column; align-items: center; justify-content: center;">
        <div class="success-icon" style="background: #28a745; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" style="width: 40px;">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <div class="success-text" style="text-align: center;">
            <h2 style="margin: 0;">Pagamento Recebido!</h2>
            <p id="valor-confirmado" style="font-size: 24px; font-weight: bold; color: #333;">0.00 BNB</p>
            <p style="font-size: 12px; color: #666;">Confirmado na BNB Chain</p>
        </div>
        <button onclick="location.reload()" style="margin-top: 30px; padding: 12px 30px; border-radius: 10px; border: none; background: #007BFF; color: white; font-weight: bold;">
            Nova Cobrança
        </button>
    </div>

     <button id="btn-flutuante-nitro" class="nitro-fab">
     </button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
