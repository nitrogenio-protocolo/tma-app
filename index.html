<div id="splash-screen">
    <div class="logo-container">
        <img src="logo-raposa-branca.png" alt="Nitrogênio" id="splash-logo">
    </div>
</div>

<style>
/* Reset e Fundo */
#splash-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #ffffff; /* Branco Máximo */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 1s ease-out;
}

/* Efeito de Materialização */
#splash-logo {
    width: 150px;
    opacity: 0;
    filter: blur(10px) brightness(2); /* Começa desfocado e muito brilhante */
    transform: scale(0.8);
    animation: materialize 2.5s forwards ease-in-out;
}

@keyframes materialize {
    0% {
        opacity: 0;
        filter: blur(20px) brightness(5);
        transform: scale(0.7);
    }
    50% {
        opacity: 0.5;
        filter: blur(5px) brightness(1.5);
        transform: scale(1.05); /* Leve pulso */
    }
    100% {
        opacity: 1;
        filter: blur(0) brightness(1);
        transform: scale(1);
    }
}

/* Esconder a Splash após o carregamento */
.fade-out {
    opacity: 0;
    pointer-events: none;
}
</style>

<script>
// Lógica para transição da tela
window.addEventListener('load', () => {
    setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        splash.classList.add('fade-out');
        // Remove do DOM após a animação para não pesar
        setTimeout(() => splash.remove(), 1000);
    }, 3000); // Exibe por 3 segundos
});
</script>
