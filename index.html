<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitrogênio Protocolo</title>
    <style>
        :root {
            --branco-max: #FFFFFF;
            --cinza-suave: #F5F5F5;
            --cinza-fino: #EEEEEE;
            --preto-medio: #333333;
            --blueberry: #1E3A8A;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--branco-max);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--preto-medio);
            overflow-x: hidden;
        }

        /* Animação de Materialização */
        @keyframes materializar {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .app-container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            animation: materializar 0.8s ease-out forwards;
        }

        /* Top Bar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand h2 {
            margin: 0;
            font-weight: 600;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
        }

        .btn-connect {
            background: #000;
            color: #FFF;
            border: none;
            border-radius: 25px;
            padding: 8px 16px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* Saldo */
        .wallet-info {
            margin-bottom: 25px;
        }

        .label-saldo {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 4px;
        }

        .saldo-container {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .valor {
            font-size: 2.2rem;
            font-weight: 300;
            margin: 0;
        }

        /* Ações Rápidas */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .action-btn {
            background: var(--branco-max);
            border: 1px solid var(--cinza-fino);
            border-radius: 12px;
            padding: 15px 0;
            font-size: 0.65rem;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        /* Card Protagonista NFT */
        .nft-hero {
            background: var(--branco-max);
            border: 1px solid var(--cinza-suave);
            border-radius: 18px;
            padding: 50px 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            position: relative;
        }

        .nft-hero span {
            color: #BBB;
            font-weight: 500;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        /* Grid de Salas */
        .rooms-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-bottom: 100px;
        }

        .room-card {
            background: var(--branco-max);
            border: 1px solid var(--cinza-suave);
            padding: 22px 10px;
            border-radius: 14px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            color: #444;
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--cinza-fino);
            padding: 15px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-icon { font-size: 1.4rem; cursor: pointer; }
        .help-card {
            border: 1.5px solid var(--cinza-fino);
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <header>
        <div class="brand">
            <h2>Nitrogênio</h2>
            <span style="cursor: pointer; font-size: 1.1rem;">👁️</span>
        </div>
        <button class="btn-connect" onclick="alert('Conectar Carteira em breve')">CONECTAR CARTEIRA</button>
    </header>

    <section class="wallet-info">
        <div class="label-saldo">Saldo Token N</div>
        <div class="saldo-container">
            <h1 class="valor">0.00 N</h1>
        </div>
    </section>

    <div class="quick-actions">
        <div class="action-btn">PAGAR</div>
        <div class="action-btn">RECEBER</div>
        <div class="action-btn">ESCANEAR</div>
        <div class="action-btn">TROCAR</div>
    </div>

    <div class="nft-hero">
        <span>NFT ALPHA</span>
    </div>

    <div class="rooms-grid">
        <div class="room-card">Mercado</div>
        <div class="room-card">Tesouraria</div>
        <div class="room-card">Coleta N</div>
        <div class="room-card">Suporte</div>
        <div class="room-card">Governo</div>
        <div class="room-card">Comunidade</div>
        <div class="room-card">Mural</div>
        <div class="room-card">Protocolo</div>
    </div>

</div>

<footer>
    <div class="nav-icon">🏠</div>
    <div class="nav-icon">✈️</div>
    <div class="help-card">?</div>
</footer>

</body>
</html>
