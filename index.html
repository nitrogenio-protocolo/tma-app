<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitrogênio Protocolo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div id="text-dao" class="splash-text">DAO</div>
            <div id="text-nitrogenio" class="splash-text">Nitrogênio</div>
            <img src="raposa.png" alt="Raposa" id="splash-logo" class="splash-img">
        </div>
    </div>

    <div id="home-app" style="display: none; opacity: 0;">
        <header class="header-app">
            <div class="logo-text">Nitrogênio</div>
            <div class="header-right">
                <i id="toggle-visibility" class="fa-solid fa-eye" style="color: #007AFF; font-size: 20px; cursor: pointer; margin-right: 15px;"></i>
                <button class="btn-connect">CONECTAR</button>
            </div>
        </header>

        <div class="balance-section">
            <div class="balance-label">Saldo em Conta</div>
            <div id="balance-val" class="balance-amount">0.00 N</div>
        </div>

        <div class="action-bar">
            <div class="action-item"><i class="fa-solid fa-arrow-up"></i>PAGAR</div>
            <div class="action-item"><i class="fa-solid fa-arrow-down"></i>RECEBER</div>
            <div class="action-item"><i class="fa-solid fa-qrcode"></i>SCAN</div>
            <div class="action-item"><i class="fa-solid fa-right-left"></i>TROCAR</div>
        </div>

<div class="banner-nft">
    <strong>NFT ALPHA</strong>
    <img src="raposa.png" style="position: absolute; right: 15px; height: 100px; opacity: 0.8;">
</div>


        <div class="rooms-grid">
            <div class="room-icon"><i class="fa-solid fa-vault"></i></div>
            <div class="room-icon"><i class="fa-solid fa-cart-shopping"></i></div>
            <div class="room-icon"><i class="fa-solid fa-leaf"></i></div>
            <div class="room-icon"><i class="fa-solid fa-headset"></i></div>
            <div class="room-icon"><i class="fa-solid fa-landmark"></i></div>
            <div class="room-icon"><i class="fa-solid fa-users"></i></div>
            <div class="room-icon"><i class="fa-solid fa-chalkboard"></i></div>
            <div class="room-icon"><i class="fa-solid fa-microchip"></i></div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item" style="color: #007AFF;"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item"><i class="fa-brands fa-telegram"></i></div>
            <div class="nav-item"><i class="fa-solid fa-circle-question"></i></div>
        </nav>
    </div>

    <script>
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            const home = document.getElementById('home-app');
            const raposa = document.getElementById('splash-logo');
            
            // 1. Faz a raposa aparecer 2 segundos depois do texto
            setTimeout(() => {
                if(raposa) raposa.style.opacity = '1';
            }, 2000);

            // 2. Transição para a Home
            setTimeout(() => {
                if (splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.remove();
                        home.style.display = 'block';
                        setTimeout(() => { 
                            home.style.opacity = '1'; 
                            ligarMotorApp(); // Liga o Olho e a Carteira
                        }, 50);
                    }, 1000);
                }
            }, 9000); 
        });

        function ligarMotorApp() {
            const eyeBtn = document.getElementById('toggle-visibility');
            const balanceVal = document.getElementById('balance-val');
            let oculto = false;

            if (eyeBtn && balanceVal) {
                eyeBtn.addEventListener('click', () => {
                    oculto = !oculto;
                    if (oculto) {
                        balanceVal.innerText = "****";
                        eyeBtn.classList.replace('fa-eye', 'fa-eye-slash');
                    } else {
                        balanceVal.innerText = "0.00 N";
                        eyeBtn.classList.replace('fa-eye-slash', 'fa-eye');
                    }
                });
            }
        }
    </script>
</body>
</html>
