<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitrogênio Protocolo</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; overflow: hidden; background: #FFFFFF; }
        
        /* Camada Azul Blueberry */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: #0047AB; display: flex; justify-content: center; 
            align-items: center; z-index: 100; 
            transition: transform 1.5s cubic-bezier(0.65, 0, 0.35, 1); 
        }

        /* Efeito de Materialização Etérea */
        .materialize { 
            text-align: center; color: white; opacity: 0; 
            transform: scale(0); transition: all 2s ease-out; 
        }
        .show { opacity: 1; transform: scale(1); }

        /* Estilo da SUA Raposa */
        .fox-logo { 
            width: 160px; margin-bottom: 20px; display: none; 
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        /* Dashboard Branco Máximo (Paz) */
        .dashboard { 
            background: #FFFFFF; min-height: 100vh; display: flex; 
            flex-direction: column; justify-content: center; 
            align-items: center; opacity: 0; transition: opacity 1s; 
            color: #4A4A4A; 
        }
        .dashboard-active { opacity: 1; }
    </style>
</head>
<body>

    <div id="blue-screen" class="overlay">
        <div id="material-container" class="materialize">
            <img src="raposa.png" class="fox-logo" id="fox-img">
            <h1 id="main-text" style="font-weight: 100; letter-spacing: 8px; font-size: 2rem;">DAO</h1>
        </div>
    </div>

    <div id="main-app" class="dashboard">
        <p style="color: #BBBBBB; letter-spacing: 3px; font-size: 0.7rem;">PROTOCOLO</p>
        <h2 style="font-weight: 300; letter-spacing: 5px; font-size: 1.8rem; margin-top: 5px;">NITROGÊNIO</h2>
        <div style="margin-top: 40px; border: 1px solid #F2F2F2; padding: 30px; border-radius: 15px; width: 250px;">
            <button style="background: none; border: 1px solid #4A4A4A; color: #4A4A4A; padding: 12px 20px; border-radius: 5px; width: 100%; font-size: 0.8rem; letter-spacing: 1px;">CONECTAR CARTEIRA</button>
        </div>
    </div>

    <script>
        window.onload = () => {
            const container = document.getElementById('material-container');
            const text = document.getElementById('main-text');
            const fox = document.getElementById('fox-img');
            const blue = document.getElementById('blue-screen');
            const app = document.getElementById('main-app');

            // 1. Materializa DAO (Início da paz)
            setTimeout(() => container.classList.add('show'), 500);

            // 2. Transição suave para a Raposa + Nome
            setTimeout(() => {
                container.classList.remove('show');
                setTimeout(() => {
                    text.innerText = "NITROGÊNIO";
                    text.style.fontSize = "1.4rem";
                    fox.style.display = "inline-block";
                    container.classList.add('show');
                }, 1500);
            }, 3500);

            // 3. Teletransporte para o Dashboard Branco
            setTimeout(() => {
                blue.style.transform = "translateY(-100%)";
                app.classList.add('dashboard-active');
            }, 8500);
        };
    </script>
</body>
</html>
