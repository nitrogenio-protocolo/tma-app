<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitrogênio Protocolo | DAO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <h1>NITROGÊNIO <span>N</span></h1>
            <div class="status-badge">BSC MAINNET</div>
        </div>
        <button id="btn-conectar" class="btn-wallet">CONECTAR CARTEIRA</button>
    </header>

    <main>
        <section class="card-master">
            <div class="balance-info">
                <p class="label">SALDO EM CARTEIRA</p>
                <h2 id="saldo-bnb">0.0000 <span>BNB</span></h2>
                <h3 id="saldo-n">0.00 N</h3>
            </div>
            <div class="nft-badge">
                <img src="https://img.icons8.com/ios-filled/50/007BFF/identity-theft.png" alt="NFT Alpha">
                <span>SEM ACESSO ALPHA</span>
            </div>
        </section>

        <nav class="quick-actions">
            <button onclick="abrir('pagar')">↑ PAGAR</button>
            <button onclick="abrir('receber')">↓ RECEBER</button>
            <button onclick="abrir('coleta')">N COLETAR</button>
            <button onclick="abrir('troca')">⇄ TROCAR</button>
        </nav>

        <section class="grid-dao">
            <div class="sala-card" onclick="abrir('governo')">GOVERNO</div>
            <div class="sala-card" onclick="abrir('mural')">MURAL</div>
            <div class="sala-card" onclick="abrir('comunidade')">COMUNIDADE</div>
            <div class="sala-card" onclick="abrir('tesouraria')">TESOURARIA</div>
        </section>

        <section class="mint-area">
            <h3>MINT NFT ALPHA</h3>
            <input type="text" id="padrinho" placeholder="Endereço do Padrinho">
            <button class="btn-primary">MINTAR AGORA (0.1 BNB)</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
