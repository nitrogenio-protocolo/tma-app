<header id="header-app">
    <div class="header-content">
        <span class="brand-name">NITROGÊNIO</span>
        <div class="header-actions">
            <button id="toggle-privacy" class="btn-eye"><i class="fa-solid fa-eye"></i></button>
            <button id="connect-trigger" class="btn-connect">CONECTAR</button>
        </div>
    </div>
</header>

<main class="main-content">
    
    <section class="carousel-rail alpha-actions">
        <div class="carousel-inner">
            <div class="action-item" onclick="abrirPagar()"><div class="icon-circle"><i class="fa-solid fa-arrow-up"></i></div><span>PAGAR</span></div>
            <div class="action-item" onclick="abrirReceber()"><div class="icon-circle"><i class="fa-solid fa-arrow-down"></i></div><span>RECEBER</span></div>
            <div class="action-item" onclick="toggleScanner()"><div class="icon-circle"><i class="fa-solid fa-qrcode"></i></div><span>QR CODE</span></div>
            <div class="action-item"><div class="icon-circle"><i class="fa-solid fa-repeat"></i></div><span>TROCAR</span></div>
            <div class="action-item" onclick="abrirNFT()"><div class="icon-circle"><i class="fa-solid fa-id-card"></i></div><span>NFT</span></div>
            <div class="action-item"><div class="icon-circle"><i class="fa-solid fa-rotate"></i></div><span>GIRO</span></div>
        </div>
    </section>

    <section class="carousel-rail dao-management">
        <div class="carousel-inner">
            <div class="card-management" onclick="abrirPainel('comunidade')"><h3>COMUNIDADE</h3><p>Votos e Sugestões</p></div>
            <div class="card-management" onclick="abrirPainel('governo')"><h3>GOVERNO</h3><p>Pautas da Safe</p></div>
            <div class="card-management" onclick="abrirPainel('mural')"><h3>MURAL</h3><p>Histórico Alpha</p></div>
        </div>
    </section>

    <section class="carousel-rail ops-lifestyle">
        <div class="carousel-inner">
            <div class="card-lifestyle" onclick="abrirPainel('protocolo')"><h3>PROTOCOLO</h3></div>
            <div class="card-lifestyle" onclick="abrirPainel('cofre')"><h3>COFRE</h3></div>
            <div class="card-lifestyle" onclick="abrirPainel('lazer')"><h3>LAZER</h3></div>
        </div>
    </section>

</main>

<footer id="footer-app">
    <nav class="footer-nav">
        <button onclick="window.location.reload()"><i class="fa-solid fa-house"></i><span>HOME</span></button>
        <button onclick="window.open('https://t.me/seuchanal')"><i class="fa-brands fa-telegram"></i><span>CANAL</span></button>
        <button onclick="location.href='mailto:suporte@exemplo.com'"><i class="fa-solid fa-headset"></i><span>SUPORTE</span></button>
    </nav>
</footer>
