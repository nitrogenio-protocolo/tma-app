<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitrogênio Protocolo - TMA</title>
    <style>
        /* Estética Cyber-Industrial Clean */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0047AB; /* Azul Blueberry */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            position: relative;
            width: 100%;
        }

        /* Animações de Suavidade */
        .fade-text {
            position: absolute;
            width: 100%;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 5px;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .btn-conectar {
            margin-top: 100px;
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: white;
            color: #0047AB;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease-out;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Estados de Animação */
        .show { opacity: 1 !important; }
        .move-up { opacity: 1 !important; transform: translateY(0) !important; }
    </style>
</head>
<body>

    <div class="container">
        <div id="status-dao" class="fade-text">DAO</div>
        
        <div id="status-nitro" class="fade-text">NITROGÊNIO</div>

        <button id="btn-wallet" class="btn-conectar">CONECTAR CARTEIRA (ALPHA)</button>
    </div>

    <script>
        const dao = document.getElementById('status-dao');
        const nitro = document.getElementById('status-nitro');
        const btn = document.getElementById('btn-wallet');

        // Sequência de "Teletransporte Suave"
        window.onload = () => {
            // 1. Aparece DAO
            setTimeout(() => {
                dao.classList.add('show');
            }, 500);

            // 2. Apaga DAO
            setTimeout(() => {
                dao.classList.remove('show');
            }, 2500);

            // 3. Aparece Nitrogênio Fixado
            setTimeout(() => {
                nitro.classList.add('show');
            }, 4000);

            // 4. Sobe o botão de conexão
            setTimeout(() => {
                btn.classList.add('move-up');
            }, 5000);
        };
    </script>
</body>
</html>
