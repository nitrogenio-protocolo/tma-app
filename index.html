<header id="header-app">
    <div class="header-content">
        <span class="brand-name">NITROGÊNIO</span>
        <div class="header-actions">
            <button id="btn-eye" onclick="togglePrivacy()"><i class="fa-solid fa-eye"></i></button>
            <button id="connect-trigger" class="btn-wallet">CONECTAR</button>
        </div>
    </div>
</header>

<main class="main-content">
    
    <section class="hub-carousel">
        <div class="carousel-track">
            <div class="item-alpha" onclick="abrirPagar()"><i class="fa-solid fa-arrow-up"></i><span>PAGAR</span></div>
            <div class="item-alpha" onclick="abrirReceber()"><i class="fa-solid fa-arrow-down"></i><span>RECEBER</span></div>
            <div class="item-alpha" onclick="toggleScanner()"><i class="fa-solid fa-qrcode"></i><span>QR CODE</span></div>
            <div class="item-alpha"><i class="fa-solid fa-repeat"></i><span>TROCAR</span></div>
            <div class="item-alpha" onclick="abrirNFT()"><i class="fa-solid fa-id-card"></i><span>NFT</span></div>
        </div>
    </section>

    <section class="hub-carousel secondary">
        <div class="carousel-track">
            <div class="item-dao" onclick="abrirPainel('comunidade')">
                <i class="fa-solid fa-users"></i>
                <p>COMUNIDADE</p>
            </div>
            <div class="item-dao" onclick="abrirPainel('governo')">
                <i class="fa-solid fa-building-columns"></i>
                <p>GOVERNO</p>
            </div>
            <div class="item-dao" onclick="abrirPainel('mural')">
                <i class="fa-solid fa-chalkboard"></i>
                <p>MURAL</p>
            </div>
        </div>
    </section>

    <section class="hub-carousel tertiary">
        <div class="carousel-track">
            <div class="item-op" onclick="abrirPainel('protocolo')">
                <i class="fa-solid fa-file-shield"></i>
                <span>PROTOCOLO</span>
            </div>
            <div class="item-op" onclick="abrirPainel('cofre')">
                <i class="fa-solid fa-vault"></i>
                <span>COFRE</span>
            </div>
            <div class="item-op" onclick="abrirPainel('lazer')">
                <i class="fa-solid fa-couch"></i>
                <span>LAZER</span>
            </div>
        </div>
    </section>

</main>

<footer id="footer-app">
    <button class="nav-btn active" onclick="location.reload()"><i class="fa-solid fa-house"></i><span>HOME</span></button>
    <a href="https://t.me/seucanal" target="_blank" class="nav-btn"><i class="fa-brands fa-telegram"></i><span>OFICIAL</span></a>
    <button class="nav-btn" onclick="abrirSuporte()"><i class="fa-solid fa-headset"></i><span>SUPORTE</span></button>
</footer>
