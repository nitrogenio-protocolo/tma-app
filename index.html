<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitrogênio Protocolo | DAO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.12.1/dist/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <header>
        <div class="logo-area">
            <h1>NITROGÊNIO <span></span></h1>
            <p class="network-label">BSC MAINNET</p>
        </div>
        <button id="btn-conectar" class="btn-wallet">CONECTAR</button>
    </header>

    <main>
        <section class="card-master">
            <div class="balance-info">
                <p class="label">SALDO CONTA</p>
                <h2 id="display-bnb">R$ 0.00000 <span></span></h2>
            </div> 
        </section>

        <!-- Grade de Ações com texto abaixo e afastamento de 20px -->
        <nav class="nav-actions">
            <div class="action-item">
                <button class="btn-act" id="btn-pagar">↑</button>
                <span class="btn-label">PAGAR</span>
            </div>
            <div class="action-item">
                <button class="btn-act" id="btn-receber">↓</button>
                <span class="btn-label">RECEBER</span>
            </div>
            <div class="action-item">
                <button class="btn-act" id="btn-coletar">↓</button>
                <span class="btn-label">COLETAR</span>
            </div>
            <div class="action-item">
                <button class="btn-act" id="btn-trocar">⇄</button>
                <span class="btn-label">TROCAR</span>
            </div>
        </nav>

        <section class="grid-dao">
            <div class="sala">COMUNIDADE</div>
            <div class="sala">GOVERNO</div>
            <div class="sala">MURAL</div>
            <div class="sala">TESOURARIA</div>
        </section>
    </main>

    <div id="side-panel" class="side-panel">
        <div class="panel-header">
            <button id="close-panel" class="btn-back">← VOLTAR</button>
            <h2 id="panel-title">AÇÃO</h2>
        </div>
        <div id="panel-content" class="panel-body"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
