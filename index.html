<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitrogênio Protocolo</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header id="header-app">
    <div class="header-content">
        <span class="brand-name">NITROGÊNIO</span>
        <div class="header-actions">
            <button id="btn-eye" class="btn-icon"><i class="fa-solid fa-eye"></i></button>
            <button id="connect-trigger" class="btn-wallet">CONECTAR</button>
        </div>
    </div>
</header>

<main class="main-content">
    
    <section class="hub-carousel">
        <div class="carousel-track">
            <div class="item-round"><i class="fa-solid fa-arrow-up"></i><span>PAGAR</span></div>
            <div class="item-round"><i class="fa-solid fa-arrow-down"></i><span>RECEBER</span></div>
            <div class="item-round">
                <div class="n-simbolo">N</div>
                <span>COLETAR</span>
            </div>
            <div class="item-round"><i class="fa-solid fa-repeat"></i><span>TROCAR</span></div>
        </div>
    </section>

    <section class="hub-carousel">
        <div class="carousel-track">
            <div class="item-round nft-special">
                <i class="fa-solid fa-id-card"></i>
                <span>NFT</span>
            </div>
        </div>
    </section>

    <section class="hub-carousel secondary">
        <div class="carousel-track">
            <div class="item-dao">
                <i class="fa-solid fa-users"></i>
                <p>COMUNIDADE</p>
            </div>
            <div class="item-dao">
                <i class="fa-solid fa-building-columns"></i>
                <p>GOVERNO</p>
            </div>
            <div class="item-dao">
                <i class="fa-solid fa-chalkboard"></i>
                <p>MURAL</p>
            </div>
        </div>
    </section>

    <section class="hub-carousel tertiary">
        <div class="carousel-track">
            <div class="item-op">
                <i class="fa-solid fa-gavel"></i>
                <span>PROTOCOLO</span>
            </div>
            <div class="item-op">
                <i class="fa-solid fa-vault"></i>
                <span>COFRE</span>
            </div>
            <div class="item-op">
                <i class="fa-solid fa-couch"></i>
                <span>LAZER</span>
            </div>
        </div>
    </section>

</main>

<footer id="footer-app">
    <button class="nav-btn active"><i class="fa-solid fa-house"></i><span>HOME</span></button>
    <a href="#" class="nav-btn"><i class="fa-brands fa-telegram"></i><span>OFICIAL</span></a>
    <button class="nav-btn"><i class="fa-solid fa-headset"></i><span>SUPORTE</span></button>
</footer>

</body>
</html>
